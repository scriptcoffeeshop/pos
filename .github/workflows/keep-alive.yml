name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 0 */3 * *" # 每 3 天執行一次
  workflow_dispatch: # 支援手動觸發

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.VITE_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
    steps:
      - name: Ping Supabase Auth Health
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::warning::SUPABASE_URL/SUPABASE_ANON_KEY secrets 或 VITE_SUPABASE_URL/VITE_SUPABASE_ANON_KEY variables 未設定，略過 Keep Alive。"
            exit 0
          fi

          echo "Pinging Supabase Auth health endpoint..."
          RESPONSE_CODE=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 20 -X GET "${SUPABASE_URL%/}/auth/v1/health" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")

          echo "HTTP Response Code: $RESPONSE_CODE"

          if [ "$RESPONSE_CODE" = "200" ] || [ "$RESPONSE_CODE" = "301" ] || [ "$RESPONSE_CODE" = "302" ]; then
            echo "Successfully pinged Supabase Auth health endpoint."
          else
            echo "Failed to ping Supabase Auth health endpoint (Code: $RESPONSE_CODE)."
            exit 1
          fi
