name: Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_debug_apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build web assets and sync Android
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_POS_STORE_ID: ${{ vars.VITE_POS_STORE_ID }}
          VITE_POS_PRINTER_HOST: ${{ vars.VITE_POS_PRINTER_HOST }}
          VITE_POS_PRINTER_PORT: ${{ vars.VITE_POS_PRINTER_PORT }}
        run: npm run cap:sync

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: script-coffee-pos-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
