name: POS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: "部署 GitHub Pages 前端"
        required: false
        type: boolean
        default: false
      deploy_supabase:
        description: "部署 Supabase migrations 與 Edge Functions"
        required: false
        type: boolean
        default: true

concurrency:
  group: pos-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@main
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Run frontend guardrails
        run: npm run guardrails

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check Edge Function
        run: npm run check:backend

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_POS_STORE_ID: ${{ vars.VITE_POS_STORE_ID }}
          VITE_POS_PRINTER_HOST: ${{ vars.VITE_POS_PRINTER_HOST }}
          VITE_POS_PRINTER_PORT: ${{ vars.VITE_POS_PRINTER_PORT }}
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v7
        with:
          name: pos-dist
          path: dist
          if-no-files-found: error

  deploy_frontend:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_frontend)
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download frontend build artifact
        uses: actions/download-artifact@v5
        with:
          name: pos-dist
          path: dist

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  deploy_backend:
    name: Deploy Supabase
    if: (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_supabase)) && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Verify Supabase deploy configuration
        id: deploy_config
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::Missing SUPABASE_ACCESS_TOKEN secret; skipping Supabase deployment."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::warning::Missing SUPABASE_DB_PASSWORD secret; skipping Supabase deployment."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::warning::Missing SUPABASE_PROJECT_REF variable; skipping Supabase deployment."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Setup Supabase CLI
        if: steps.deploy_config.outputs.ready == 'true'
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Push database migrations
        if: steps.deploy_config.outputs.ready == 'true'
        run: bash scripts/supabase_db_push.sh

      - name: Deploy Edge Function
        if: steps.deploy_config.outputs.ready == 'true'
        run: bash scripts/supabase_deploy.sh
